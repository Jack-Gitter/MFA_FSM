<!DOCTYPE html>
<html>
<head><title>Working…</title></head>
<body>
  <h1>One moment…</h1>
  <p>We're processing your request. This page will advance automatically.</p>

  <script>
    // States that mean "still working, keep waiting here".
    const TRANSIENT = ['awaiting_magic_link'];

    async function poll() {
      try {
        const res = await fetch('/auth/status');
        const { state } = await res.json();
        if (!state) {
          window.location.href = '/auth';
          return;
        }
        if (!TRANSIENT.includes(state)) {
          window.location.href = '/auth/verify';
        }
      } catch (err) {
        // transient network error — keep polling
      }
    }

    setInterval(poll, 1500);
    poll();
  </script>
</body>
</html>
